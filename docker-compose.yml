version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: sowenix-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: sowenix1234
      MYSQL_DATABASE: sowenix
      MYSQL_USER: sowenix
      MYSQL_PASSWORD: sowenix1234
    ports:
      - "3307:3306"
    volumes:
      - sowenix-mysql-data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci --default-authentication-plugin=mysql_native_password

volumes:
  sowenix-mysql-data: